<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
        <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="style.css">

        <py-config>
            packages = ["numpy", "matplotlib"]
        </py-config>

        <title>NumPy and Matplotlib</title>
    </head>
<body>
    <div class="container mt-4">
        <h2 class="text-center mb-4">Attendance Tracker</h2>

        <div class="form-group">
            <label>Select Day:</label>
            <select id="day" class="form-control">
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
            </select>
        </div>

        <div class="form-group mt-3">
            <label>Number of Absences:</label>
            <input type="number" id="absence" class="form-control" min="0">
        </div>

        <button class="btn btn-primary mt-3" py-click="add_absence">
            Add/Update Absence
        </button>

        <button class="btn btn-success mt-3" py-click="show_graph">
            Show Graph
        </button>

        <p id="message" class="mt-3 text-danger"></p>

        <div id="graph-output" class="mt-4"></div>
    </div>

    <py-script src="main.py"></py-script>
</body>
